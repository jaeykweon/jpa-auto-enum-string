name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: "8"
            module: "integration-spring-boot2"
          - java: "11"
            module: "integration-spring-boot2"
          - java: "17"
            module: "integration-spring-boot2"
          - java: "17"
            module: "integration-spring-boot3"
          - java: "21"
            module: "integration-spring-boot3"
          - java: "21"
            module: "integration-spring-boot4"

    steps:
      - uses: actions/checkout@v4
      - name: Set up test JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
      - name: Set up JDK 17 for Gradle
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle
      - name: Test
        run: ./gradlew :tests:${{ matrix.module }}:test -PtestJavaVersion=${{ matrix.java }}
